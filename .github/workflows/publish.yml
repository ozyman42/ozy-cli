name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-latest
          - platform: darwin-x64
            runner: macos-latest
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
          - platform: windows-x64
            runner: windows-latest
          - platform: base-package
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build ${{ matrix.platform }}

      - name: Pack
        run: npm pack && mv *.tgz package.tgz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: package.tgz

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: 'https://registry.npmjs.org'

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Publish platform packages
        run: |
          npm publish ./darwin-arm64/package.tgz  --tag darwin-arm64
          npm publish ./darwin-x64/package.tgz    --tag darwin-x64
          npm publish ./linux-x64/package.tgz     --tag linux-x64
          npm publish ./linux-arm64/package.tgz   --tag linux-arm64
          npm publish ./windows-x64/package.tgz   --tag windows-x64

      - name: Publish base package
        run: npm publish ./base-package/package.tgz --tag latest
